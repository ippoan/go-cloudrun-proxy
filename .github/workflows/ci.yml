name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

# go-ci.yml は内部に `disable-auto-merge` job (`pull-requests: write` 要求) を
# 持つ。nested の secret-verify job は本 repo では使わないが、reusable parse
# 時の caller permissions check のため `id-token: write` の declare は必須
# (ci-workflows CLAUDE.md「startup_failure」参照)。
permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/go-ci.yml@main
    with:
      test_args: './... -race'
      # library のみ (main package なし) なので default の `-o /tmp/server` を外す
      build_args: './...'

  # CI 完走後に squash auto-merge を queue する (go-ci.yml は auto-merge を
  # 内蔵しないため caller で組む、ci-workflows CLAUDE.md 参照)。merge gate は
  # branch protection の required checks (ci / vet, ci / test, ci / build) が
  # 握る。deploy 系 job は本 repo に無いので needs は ci のみで足りる
  # (auto-merge.yml 内蔵の deploy gate 静的検査も対象 job 0 で pass する)。
  auto-merge:
    if: github.event_name == 'pull_request'
    needs: [ci]
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    # auto-merge.yml は GitHub App credential (CI_APP_ID / CI_APP_PRIVATE_KEY、
    # org secrets) を必須とするため secrets: inherit が必要。
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
